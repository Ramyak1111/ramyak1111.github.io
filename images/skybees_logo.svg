<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" width="400" height="160">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&amp;display=swap');

      .bee-group {
        animation: float 3s ease-in-out infinite;
        transform-origin: 60px 80px;
      }

      .wing-left {
        animation: flap 0.18s ease-in-out infinite alternate;
        transform-origin: 52px 68px;
      }

      .wing-right {
        animation: flap-r 0.18s ease-in-out infinite alternate;
        transform-origin: 68px 68px;
      }

      .trail-1 { animation: trail 3s ease-in-out infinite; opacity: 0; }
      .trail-2 { animation: trail 3s ease-in-out infinite 0.15s; opacity: 0; }
      .trail-3 { animation: trail 3s ease-in-out infinite 0.3s; opacity: 0; }

      .logo-text {
        font-family: 'Syne', sans-serif;
        font-weight: 800;
      }

      .tagline {
        font-family: 'Syne', sans-serif;
        font-weight: 400;
      }

      .glow-ring {
        animation: pulse 2.5s ease-in-out infinite;
        transform-origin: 60px 80px;
      }

      .star-1 { animation: twinkle 2s ease-in-out infinite 0s; }
      .star-2 { animation: twinkle 2s ease-in-out infinite 0.6s; }
      .star-3 { animation: twinkle 2s ease-in-out infinite 1.2s; }

      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-6px); }
      }

      @keyframes flap {
        0% { transform: scaleY(1) rotate(-8deg); }
        100% { transform: scaleY(0.3) rotate(-8deg); }
      }

      @keyframes flap-r {
        0% { transform: scaleY(1) rotate(8deg); }
        100% { transform: scaleY(0.3) rotate(8deg); }
      }

      @keyframes trail {
        0% { opacity: 0; transform: translateX(0); }
        20% { opacity: 0.6; }
        60% { opacity: 0; transform: translateX(-18px); }
        100% { opacity: 0; }
      }

      @keyframes pulse {
        0%, 100% { opacity: 0.15; transform: scale(1); }
        50% { opacity: 0.35; transform: scale(1.12); }
      }

      @keyframes twinkle {
        0%, 100% { opacity: 0.2; transform: scale(0.8); }
        50% { opacity: 1; transform: scale(1.2); }
      }
    </style>

    <!-- Honey gradient for bee body -->
    <radialGradient id="bodyGrad" cx="45%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="100%" stop-color="#F6A800"/>
    </radialGradient>

    <!-- Wing gradient -->
    <linearGradient id="wingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C8E8FF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#90C8FF" stop-opacity="0.4"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#F6A800" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background: transparent -->

  <!-- Glow ring behind bee -->
  <ellipse class="glow-ring" cx="60" cy="80" rx="38" ry="38" fill="#f6e05e" filter="url(#glow)"/>

  <!-- Motion trails -->
  <circle class="trail-1" cx="38" cy="82" r="4" fill="#f6e05e" opacity="0.5"/>
  <circle class="trail-2" cx="28" cy="79" r="3" fill="#f6e05e" opacity="0.4"/>
  <circle class="trail-3" cx="18" cy="81" r="2" fill="#f6e05e" opacity="0.3"/>

  <!-- BEE GROUP (floats up and down) -->
  <g class="bee-group" filter="url(#shadow)">

    <!-- Wings -->
    <ellipse class="wing-left" cx="45" cy="68" rx="16" ry="9" fill="url(#wingGrad)" stroke="#a0d0ff" stroke-width="0.5"/>
    <ellipse class="wing-right" cx="75" cy="68" rx="16" ry="9" fill="url(#wingGrad)" stroke="#a0d0ff" stroke-width="0.5"/>

    <!-- Bee body -->
    <ellipse cx="60" cy="83" rx="22" ry="17" fill="url(#bodyGrad)"/>

    <!-- Stripes -->
    <rect x="40" y="79" width="40" height="6" rx="3" fill="#1a1a1a" opacity="0.7"/>
    <rect x="41" y="88" width="38" height="5" rx="2.5" fill="#1a1a1a" opacity="0.5"/>

    <!-- Bee head -->
    <circle cx="60" cy="64" r="12" fill="url(#bodyGrad)"/>

    <!-- Eyes -->
    <circle cx="55" cy="62" r="3.5" fill="#1a1a1a"/>
    <circle cx="65" cy="62" r="3.5" fill="#1a1a1a"/>
    <circle cx="54" cy="61" r="1.2" fill="white"/>
    <circle cx="64" cy="61" r="1.2" fill="white"/>

    <!-- Smile -->
    <path d="M55 68 Q60 72 65 68" stroke="#1a1a1a" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Antennae -->
    <line x1="55" y1="53" x2="50" y2="45" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="65" y1="53" x2="70" y2="45" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="50" cy="44" r="2.5" fill="#f6e05e" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="70" cy="44" r="2.5" fill="#f6e05e" stroke="#1a1a1a" stroke-width="1"/>

    <!-- Stinger -->
    <path d="M60 99 L56 107 L60 104 L64 107 Z" fill="#F6A800"/>

  </g>

  <!-- Twinkling stars -->
  <g class="star-1">
    <polygon points="130,38 131.5,35 133,38 136,38 133.8,40 134.7,43 131.5,41.2 128.3,43 129.2,40 127,38" fill="#f6e05e"/>
  </g>
  <g class="star-2">
    <polygon points="155,55 156,53 157,55 159,55 157.5,56.5 158,58.5 156,57.3 154,58.5 154.5,56.5 153,55" fill="#f6e05e" opacity="0.7"/>
  </g>
  <g class="star-3">
    <polygon points="138,18 139,16 140,18 142,18 140.5,19.5 141,21.5 139,20.3 137,21.5 137.5,19.5 136,18" fill="#f6e05e" opacity="0.5"/>
  </g>

  <!-- Logo Text -->
  <text x="148" y="85" class="logo-text" font-size="42" fill="#1a1a1a" letter-spacing="-1">
    <tspan fill="#1a1a1a">Sky</tspan><tspan fill="#f6a800">Bees</tspan>
  </text>

  <!-- AI badge -->
  <rect x="148" y="95" width="28" height="14" rx="4" fill="#1a1a1a"/>
  <text x="152" y="106" font-family="monospace" font-size="9" fill="#f6e05e" letter-spacing="1">AI</text>

  <!-- Tagline -->
  <text x="182" y="107" class="tagline" font-size="11" fill="#888" letter-spacing="2">INTELLIGENCE THAT WORKS</text>

  <!-- Thin underline accent -->
  <line x1="148" y1="115" x2="370" y2="115" stroke="#f6e05e" stroke-width="1.5" opacity="0.5"/>

</svg>
